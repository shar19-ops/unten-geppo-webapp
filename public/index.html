<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>運転管理月報</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=20260722l">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=20260722l">
<meta name="theme-color" content="#2f6fed">
<link rel="stylesheet" href="style.css?v=20260722l">
</head>
<body>
<header class="app-header no-print">
  <h1>運転管理月報</h1>
  <label class="admin-toggle"><input type="checkbox" id="adminModeCheck"> 管理者</label>
</header>

<nav class="tabbar no-print">
  <button class="tab-btn" data-view="vehicles"><span class="tab-btn-label">車両リスト</span></button>
  <button class="tab-btn" data-view="trip-entry"><span class="tab-btn-label">運転記録入力</span></button>
  <button class="tab-btn" data-view="report"><span class="tab-btn-label">運転月報</span></button>
</nav>

<main id="app">
  <section id="view-vehicles" class="view"></section>
  <section id="view-trip-entry" class="view"></section>
  <section id="view-report" class="view"></section>
</main>

<div class="admin-pw-overlay no-print" id="adminPwOverlay" hidden>
  <div class="admin-pw-dialog">
    <h2>管理者パスワード</h2>
    <input type="password" id="adminPwInput" class="input-lg" placeholder="パスワード" autocomplete="off">
    <p class="status error" id="adminPwError"></p>
    <div class="form-actions">
      <button type="button" class="btn btn-primary" id="adminPwConfirmBtn">解除</button>
      <button type="button" class="btn btn-ghost" id="adminPwCancelBtn">キャンセル</button>
    </div>
  </div>
</div>

<script src="storage.js?v=20260722l"></script>
<script src="vehicles.js?v=20260722l"></script>
<script src="trip-entry.js?v=20260722l"></script>
<script src="report.js?v=20260722l"></script>
<script src="xlsx-export.js?v=20260722l"></script>
<script src="app.js?v=20260722l"></script>
</body>
</html>
